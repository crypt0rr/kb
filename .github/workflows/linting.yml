name: Perform markdown linting

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'content/**/*.md'
      - 'README.md'
      - '.markdownlint.yml'
      - '.github/workflows/linting.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'content/**/*.md'
      - 'README.md'
      - '.markdownlint.yml'
      - '.github/workflows/linting.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Clone this repo
        uses: actions/checkout@v6

      - name: Lint content Markdown
        uses: rvben/rumdl@v0
        with:
          version: '0.1.91'
          path: 'content/'
          config: '.markdownlint.yml'
          report-type: annotations

      - name: Lint README
        uses: rvben/rumdl@v0
        with:
          version: '0.1.91'
          path: 'README.md'
          config: '.markdownlint.yml'
          report-type: annotations
